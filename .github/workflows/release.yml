name: Release

# Publish a self-contained .exe to GitHub Releases when a version tag is pushed.
# Tags are per-tool:  ocean-vX.Y.Z  ->  UnimexFTZ.exe
#                     air-vX.Y.Z    ->  UnimexAir.exe
# The tag's number MUST match the matching constant in _version.py (checked
# below), or the build fails fast. The customs team's installed exes see the new
# release and self-update on the next run that hits a skipped file.

on:
  push:
    tags:
      - "ocean-v*"
      - "air-v*"

permissions:
  contents: write        # needed for `gh release create`

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Resolve tool + version from tag
        id: meta
        shell: bash
        run: |
          TAG="$GITHUB_REF_NAME"
          case "$TAG" in
            ocean-v*) NAME=UnimexFTZ; ENTRY=ftz_processor.py; VAR=OCEAN_VERSION ;;
            air-v*)   NAME=UnimexAir; ENTRY=air_processor.py; VAR=AIR_VERSION   ;;
            *) echo "::error::Unknown tag prefix: $TAG"; exit 1 ;;
          esac
          echo "name=$NAME"          >> "$GITHUB_OUTPUT"
          echo "entry=$ENTRY"        >> "$GITHUB_OUTPUT"
          echo "var=$VAR"            >> "$GITHUB_OUTPUT"
          echo "tag_ver=${TAG#*-v}"  >> "$GITHUB_OUTPUT"

      - name: Verify tag matches _version.py
        shell: bash
        env:
          VAR: ${{ steps.meta.outputs.var }}
        run: |
          CODE_VER=$(python -c "import _version, os; print(getattr(_version, os.environ['VAR']))")
          echo "tag=${{ steps.meta.outputs.tag_ver }}  code=$CODE_VER"
          if [ "$CODE_VER" != "${{ steps.meta.outputs.tag_ver }}" ]; then
            echo "::error::Tag version ${{ steps.meta.outputs.tag_ver }} != _version.py $CODE_VER. Bump _version.py or fix the tag."
            exit 1
          fi

      - name: Build exe (same flags as build.bat, UPX off)
        run: >
          python -m PyInstaller --onefile --console --clean --noupx
          --name ${{ steps.meta.outputs.name }}
          ${{ steps.meta.outputs.entry }}

      - name: Create GitHub Release and upload asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/${{ steps.meta.outputs.name }}.exe" \
            --title "${{ steps.meta.outputs.name }} $GITHUB_REF_NAME" \
            --notes "Automated release for $GITHUB_REF_NAME. See CHANGELOG.md for details."
